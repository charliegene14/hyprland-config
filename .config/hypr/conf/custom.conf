# Add your additional Hyprland configurations here

# -----------------------------------------------------
# Layer blur rules (premium theme)
# Hyprland 0.55 syntax: each effect needs a value separated by a space.
# Effect names: blur, ignore_alpha (replaces old `ignorezero`), etc.
# -----------------------------------------------------
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace nwg-dock
layerrule = ignore_alpha 0.0, match:namespace waybar
layerrule = ignore_alpha 0.0, match:namespace nwg-dock

# -----------------------------------------------------
# Stronger blur for the premium look
# -----------------------------------------------------
decoration {
    blur {
        size = 10
        passes = 4
        noise = 0.02
        contrast = 1.1
        brightness = 1.0
    }
}

# -----------------------------------------------------
# Tray applets (Wi-Fi + Bluetooth menus)
# -----------------------------------------------------
exec-once = nm-applet --indicator
exec-once = blueman-applet

# -----------------------------------------------------
# Premium dock (custom launcher, bigger icons)
# -----------------------------------------------------
exec-once = ~/.config/hypr/scripts/dock-premium.sh

# -----------------------------------------------------
# Clipboard history popup (Super+V → cliphist via rofi)
# -----------------------------------------------------
bind = SUPER, V, exec, cliphist list | rofi -dmenu -i -p "Clipboard" -theme ~/.config/rofi/config-short.rasi -theme-str 'window {width: 50em;} listview {lines: 12;}' | cliphist decode | wl-copy

# -----------------------------------------------------
# Écran (override scale, en dernier => prioritaire)
# -----------------------------------------------------
monitor = eDP-1, 1920x1080@144, 0x0, 1.0

# -----------------------------------------------------
# Clavier FR
# -----------------------------------------------------
input {
    kb_layout = fr
}

# -----------------------------------------------------
# Hybride Intel iGPU (Iris Xe) + NVIDIA RTX 4050
# Compositor + décodage vidéo sur Intel (stable + low-power).
# NVIDIA réservé au render offload explicite via `nvidia-offload <app>`.
# -----------------------------------------------------
env = LIBVA_DRIVER_NAME,iHD
env = ELECTRON_OZONE_PLATFORM_HINT,auto

cursor {
    no_hardware_cursors = true
}

# -----------------------------------------------------
# Workspaces via rangée du haut (compat AZERTY)
# code:10..19 = touches physiques 1..0, indépendantes du layout
# -----------------------------------------------------
bind = $mainMod, code:10, workspace, 1
bind = $mainMod, code:11, workspace, 2
bind = $mainMod, code:12, workspace, 3
bind = $mainMod, code:13, workspace, 4
bind = $mainMod, code:14, workspace, 5
bind = $mainMod, code:15, workspace, 6
bind = $mainMod, code:16, workspace, 7
bind = $mainMod, code:17, workspace, 8
bind = $mainMod, code:18, workspace, 9
bind = $mainMod, code:19, workspace, 10

bind = $mainMod SHIFT, code:10, movetoworkspace, 1
bind = $mainMod SHIFT, code:11, movetoworkspace, 2
bind = $mainMod SHIFT, code:12, movetoworkspace, 3
bind = $mainMod SHIFT, code:13, movetoworkspace, 4
bind = $mainMod SHIFT, code:14, movetoworkspace, 5
bind = $mainMod SHIFT, code:15, movetoworkspace, 6
bind = $mainMod SHIFT, code:16, movetoworkspace, 7
bind = $mainMod SHIFT, code:17, movetoworkspace, 8
bind = $mainMod SHIFT, code:18, movetoworkspace, 9
bind = $mainMod SHIFT, code:19, movetoworkspace, 10

bind = $mainMod CTRL, code:10, exec, $HYPRSCRIPTS/moveTo.sh 1
bind = $mainMod CTRL, code:11, exec, $HYPRSCRIPTS/moveTo.sh 2
bind = $mainMod CTRL, code:12, exec, $HYPRSCRIPTS/moveTo.sh 3
bind = $mainMod CTRL, code:13, exec, $HYPRSCRIPTS/moveTo.sh 4
bind = $mainMod CTRL, code:14, exec, $HYPRSCRIPTS/moveTo.sh 5
bind = $mainMod CTRL, code:15, exec, $HYPRSCRIPTS/moveTo.sh 6
bind = $mainMod CTRL, code:16, exec, $HYPRSCRIPTS/moveTo.sh 7
bind = $mainMod CTRL, code:17, exec, $HYPRSCRIPTS/moveTo.sh 8
bind = $mainMod CTRL, code:18, exec, $HYPRSCRIPTS/moveTo.sh 9
bind = $mainMod CTRL, code:19, exec, $HYPRSCRIPTS/moveTo.sh 10
